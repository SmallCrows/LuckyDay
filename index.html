<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LuckyDay</title>

    <script>
  // 检查浏览器是否支持 Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // 注册 public 目录下的 sw.js
      navigator.serviceWorker.register('/sw.js')
        .then((registration) => {
          console.log('Service Worker 注册成功，作用域为: ', registration.scope);
        })
        .catch((error) => {
          console.log('Service Worker 注册失败: ', error);
        });
    });
  }
</script>

  </head>
  
  <body style="margin: 0; background-color: #f5f5f7;">
    <div id="app">
      <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-family: -apple-system, sans-serif;">
        <span style="font-size: 18px; font-weight: bold; color: #333;">Lucky Day</span>
        <span style="font-size: 12px; margin-top: 8px;">获取气象星轨...</span>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
